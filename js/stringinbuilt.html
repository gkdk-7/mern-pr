<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let str = "Hello, World!";
      console.log(str.length); // Output: 13
      console.log(str.replace("World", "JavaScript")); // Output: Hello, JavaScript!
      console.log(str.split("a"));
      console.log(str.toUpperCase()); // Output: HELLO, WORLD!
      console.log(str.toLowerCase()); // Output: hello, world!
      console.log(str.includes("Hello")); // Output: true
      console.log(str.indexOf("o")); // Output: 4
      console.log(str.substring(0, 5)); // Output: Hello
      console.log(str.trim()); // Output: Hello, World! (removes whitespace from both ends)
      console.log(str.charAt(0)); // Output: H
      console.log(str.concat(" How are you?")); // Output: Hello, World! How are you?
      console.log(str.startsWith("Hello")); // Output: true
      console.log(str.endsWith("!")); // Output: true
      console.log(str.repeat(2)); // Output: Hello, World!Hello, World!
    </script>
  </body>
</html>
