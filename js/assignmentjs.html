<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        fieldset {
            border: none;
            background: #fff;
            padding: 2rem 2.5rem;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            min-width: 300px;
        }

        legend {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #4f6ef7;
            box-shadow: 0 0 0 3px rgba(79,110,247,0.12);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 0.5rem;
        }

        button[type="submit"] {
            flex: 1;
            padding: 10px;
            background: #4f6ef7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover { background: #3a55d4; }

        button[type="reset"] {
            flex: 1;
            padding: 10px;
            background: #fff;
            color: #555;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="reset"]:hover { background: #f4f6fb; }

        .error-msg {
            display: none;
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>🔐 Login</legend>

            <div class="error-msg" id="errorMsg">
                ❌ Invalid username or password. Please try again.
            </div>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>

            <div class="btn-row">
                <button type="submit">Login</button>
                <button type="reset" onclick="document.getElementById('errorMsg').style.display='none'">Reset</button>
            </div>
        </fieldset>
    </form>

    <script>
        // ✅ Set your valid credentials here
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "1234";

        const form = document.querySelector("form");
        const errorMsg = document.getElementById("errorMsg");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();

            if (user === VALID_USERNAME && pass === VALID_PASSWORD) {
                // ✅ Correct credentials
                errorMsg.style.display = "none";

                localStorage.setItem("username", user);
                console.log("Login successful! User:", user);

                window.open("table2.html", "_blank");
                form.reset();
            } else {
                // ❌ Wrong credentials — show error
                errorMsg.style.display = "block";
                document.getElementById("password").value = "";
                document.getElementById("password").focus();
            }
        });
    </script>
</body>
</html>
