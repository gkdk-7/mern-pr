<!DOCTYPE html>
<html>
<head>
    <title>Service Request Form</title>
</head>
<body>

<h2 style="text-align:center;">Service Request Form</h2>
 <FIeldset>
<form style="width:300px; margin:auto;">
    <fieldset>
        <legend>Customer Information</legend>
        <!-- Customer Name -->
        <label>Customer Name:</label><br>
        <input type="text" name="customer_name" placeholder="Enter your name" required><br><br>
    </fieldset>

    <!-- Contact Number -->
    <fieldset>
        <legend>Contact Information</legend>
        <label>Contact Number:</label><br>
        <input type="tel" name="contact" placeholder="Enter phone number" required><br><br>
    </fieldset>

    <!-- Issue Type -->
    <fieldset>
        <legend>Issue Information</legend>
        <label>Issue Type:</label><br>
        <select name="issue" required>
            <option value="">--Select Issue--</option>
            <option>Laptop Repair</option>
            <option>Internet Issue</option>
            <option>Software Problem</option>
            <option>Hardware Issue</option>
        </select><br><br>
    </fieldset>

    <!-- Description -->
    <fieldset>
        <legend>Issue Details</legend>
        <label>Description:</label><br>
        <textarea name="description" rows="4" placeholder="Describe your issue" required></textarea><br><br>
    </fieldset>

    <!-- Priority -->
    <fieldset>
        <legend>Priority</legend>
        <label>Priority:</label><br>
        <input type="radio" name="priority" required> Low
        <input type="radio" name="priority"> Medium
        <input type="radio" name="priority"> High<br><br>
    </fieldset>

    <!-- Submit -->
    <input type="submit" value="Submit Request">

</form>

</body>
</html>
