<!DOCTYPE html>
<html>
<head>
    <title>Survey Form</title>
</head>
<body>

<h2 align="center">Survey Form</h2>

<form>
    <fieldset>
    
    
  <fieldset>
    <legend>Personal Information</legend>
    User Name:<br>
    <input type="text" name="username" placeholder="enter name"><br><br>
    Email:<br>
    <input type="email" name="email" placeholder="enter email"><br><br>
    Age:<br>
    <input type="number" name="age" placeholder="enter age"><br><br>
  </fieldset>

  <fieldset>
    <legend>Feedback </legend>
    Feedback:<br>
    <textarea rows="4" cols="30" placeholder="enter feedback"></textarea><br><br>
  </fieldset>

  <fieldset>
    <legend>Rating</legend>

    Rating:<br>
    <input type="radio" name="rating">1
    <input type="radio" name="rating">2
    <input type="radio" name="rating">3
    <input type="radio" name="rating">4
    <input type="radio" name="rating">5<br><br>

    Favorite Technology:<br>
    <select>
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>
        <option>Python</option>
    </select><br><br>

    <input type="checkbox"> Subscribe to newsletter<br><br>

    <input type="submit" value="Submit">


</form>

</body>
</html>
