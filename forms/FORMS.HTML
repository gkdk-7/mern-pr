<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="submit" method="post">
    <fieldset style="width: 50%; margin: auto; border: 2px solid #ccc;border-top: 20px;border-width: 2px;border-radius: 30px;background-color: rgb(227, 194, 154);background-image: linear-gradient(to bottom, white);">
      <legend align="center">Registration Form</legend
     
        <label for="name">Name:</label>
        <input
          type="text"
          placeholder="enter name"
          name="name"
          maxlength="6"
          minlength="4"
          required
        /><br /><br />

        <label for="email">Email:</label>
        <input
          type="email"
          placeholder="enter email"
          name="email"
          required
        /><br /><br />

        <label for="password">Password:</label>
        <input
          type="password"
          placeholder="enter password"
          id="password"
          name="password"
          required
        /><br /><br />
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
      </form>
    </fieldset>
  </body>
</html>
