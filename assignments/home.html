<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #f2f2f2;
        }
        button {
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1 id="welcome"></h1>
<button onclick="logout()">Logout</button>

<script>
let username = localStorage.getItem("username");
document.getElementById("welcome").innerText = "Welcome, " + username;

function logout() {
    alert("Logged out successfully");
    window.location.href = "login.html";
}
</script>

</body>
</html>
