<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jobapplication</title>
</head>
<body>
    <form action="",method="post">
        
        <fieldset style="width: 350px;display: block;flex-direction: column;padding: 20px; margin: auto; border: 2px solid #ccc;border-top: 20px;border-width: 2px;border-radius: 30px;background-color: rgb(227, 194, 154);background-image: linear-gradient(to bottom, white);">
            <legend align="center">Job Application Form</legend>
            <label for="fname">FirstName:</label>
            <input type="text" id="fname" placeholder="enter  first name" name="firstname" maxlength="6" minlength="3" required><br><br>
            <label for="lname">LastName:</label>
            <input type="text" id="lname" placeholder="enter last name" name="lastname" maxlength="6" minlength="3" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="enter email" name="email" required><br><br>

           
            <label for="phno">Phone Number:</label>
            <input type="tel"  pattern="[6-9]{1}[0-9]{9}" placeholder="enter phone number" id="phno" required><br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>

             <label for="age">Age:</label>
             <input type="number" id="age" placeholder="enter age" name="age" min="0" required><br><br>
            
             <label for="gender">Gender:</label>
              <input type="radio" id="male" name="gender" value="male" required>
              <label for="male">Male</label>
              <input type="radio" id="female" name="gender" value="female" required>
              <label for="female">Female</label>
              <input type="radio" id="other" name="gender" value="other" required>
              <label for="other">srinu</label>
                <br><br>
                <label for="lang">Languages Known:</label>
                <br>
                <input type="checkbox" id="english" name="lang" value="english">
                <label for="english">English</label>
                <input type="checkbox" id="telugu" name="lang" value="telugu">
                <label for="telugu">Telugu</label>
                <input type="range" id="hindi" name="lang" value="hindi">
                <label for="hindi">Hindi</label>
                <br><br>
                <label for="country">Country:</label>
                <select id="country" name="country" required>
                    <option value="">Select Country</option>
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                </select>
                <label for="state">State:</label>
                <select id="state" name="state" required>
                    <option value="">Select State</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="West Bengal">West Bengal</option>
                
                </select><br><br>
                <label for="address">Address:</label><br>
                <textarea id="address" name="address" rows="4" cols="30">
                </textarea>
                <br><br>
                <label for="education">Education:</label><br>
                <input type="text" id="education" name="education" placeholder="enter education details" required>
                <br><br>
                <label for="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    I agree to the terms and conditions
                </label>
                <br><br>
                <label for="resume">Upload Resume:</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.doc" required>
                <br><br>
                <button type="submit" value="Submit"   
                 style="background-color: rgb(227, 154, 209);border: none;color: white;padding: 10px 20px;text-align: center;text-decoration: none;display: inline-block;font-size: 16px;margin: 4px 2px;cursor: pointer;border-radius: 5px;">
                    Submit
                </button>
                <button type="reset" value="Reset">
                    Reset
                </button>
            </fieldset>

    
</body>
</html>
