<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img[src$=".jpg"] {
            width: 200px;
        }
       
        h1[title*="ing"] {
            color: red;
        }
        h1[id^="head"] {
            font-size: 30px;
            color: blue;
        }
        h1[id$="1"] {
            font-size: 20px;
            color: brown;
        }
        h1[id="heading2"] {
            font-size: 15px;
            color: rgb(21, 172, 21);
        }
    </style>
</head>
<body>
    <h1 id="heading1">heading</h1>
    <h1 id="heading2">heading2</h1>
    <h1 id="heading3">heading3</h1>
    <h1 id="heading4">heading4</h1>
    <img src="https://cdn.pixabay.com/photo/2018/01/14/23/12/nature-3082832_1280.jpg" alt="">
</body>
</html>
