<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector</title>
    <style>
        body {
            color: rgb(133, 122, 109) ; 
            background-color: beige ;
        }
        
        
        #heading1 {
            color: red;
        }
        #heading2 {
            color: blue;
        }
        #heading3 {
            color: green;
        }
        .paragraph {
            width: 250px;
            border: 2
            2cap solid #c77e7e;
            text-decoration-color: rgb(195, 23, 23);
            text-decoration: underline;
        }   
        #paragraph1 {
            color: red;
        }
    </style>

</head>
<body>
    <h1 id="heading1">  hello</h1>
    <h1 id="heading2">  hello</h1>
    <h1 id="heading3">  hello</h1>
    <p id="paragraph1">This is a simple paragraph.</p>
    <p class="paragraph">This is a simple paragraph.</p>

</body>
</html>
