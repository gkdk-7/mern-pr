<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css </title>
    <style>
        body {
            color: rgb(133, 122, 109) !important; 
            background-color: beige !important;
        }
        h1 {
            background-color: aqua;
            align-items: center;
        }
        p {
            width: 250px;
            border: 20px solid #c77e7e;
            text-decoration-color: rgb(195, 23, 23);
        }
        ol {
            list-style-type: square;
        }
        li {
            color: red;
        }
    </style>
</head>
<body>
    <h1 style="border: 30px solid #c77e7e;"> welcome</h1>
    <p>This is a simple paragraph.</p>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
</body>
</html>
