<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
            h1 {
                font-size: 30px;
            }
           li:first-child{
                color: red;
                border: dotted rgb(21, 172, 21);
                border-color: rgb(21, 172, 21);
           }
            li:nth-child(2){
                 color: green;
                 border-color: rgb(21, 172, 21);
                color: blue;
                background-color:  rgba(55, 12, 41,88);
           }
           li:nth-child(3){
                color:alpha(rgb(182, 17, 151),0.8);
                background-color: alpha(rgb(21, 172, 21,0.5));
                border:  alpha(dotted rgb(21, 172, 21));


           }
           h1{
            color:transparent
           }
    </style>
</head>
<body>
    <ol>
        <li >
            <h1>Heading 1</h1>
        </li>
        <li>
            <h1>Heading 2</h1>
         </li>
         <li>
            <h1>Heading 3</h1>
         </li>

        
     </ol>
</body>
</html>
